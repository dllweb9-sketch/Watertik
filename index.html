<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>WaterTik - Misi Ramadhan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg-primary: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d1a3a 100%);
            --bg-card: rgba(255,255,255,0.05);
            --border: rgba(0,242,254,0.2);
            --accent: #00f2fe;
            --accent-grad: linear-gradient(135deg, #00f2fe, #2196F3);
            --btn-danger: linear-gradient(135deg, #ff0050, #ff0080);
            --text: #fff;
        }
        body { background: var(--bg-primary); min-height: 100vh; color: var(--text); padding-bottom: 75px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .card { background: var(--bg-card); backdrop-filter: blur(10px); border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--border); }
        .card h2 { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; font-size: 22px; }
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .url-input { width: 100%; padding: 14px 18px; background: rgba(0,0,0,0.4); border: 1px solid #333; border-radius: 15px; color: white; font-size: 14px; outline: none; }
        .btn { padding: 12px 20px; background: var(--btn-danger); border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-secondary { background: var(--accent-grad); color: #1a1a2e; }
    </style>
</head>
<body>

<div class="container">
    <br>
    
    <div class="card">
        <h2><i class="fas fa-exclamation-triangle"></i> Lapor Masalah</h2>
        <form id="formLaporan">
            <div class="input-group">
                <input type="text" id="nama" class="url-input" placeholder="Nama Anda" required>
                <input type="text" id="masalah" class="url-input" placeholder="Apa masalahnya?" required>
                <input type="text" id="lokasi" class="url-input" placeholder="Lokasi/Halaman mana?" required>
                <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Kirim Laporan</button>
            </div>
        </form>
    </div>

    
    <div class="card">
        <h2><i class="fab fa-tiktok"></i> TikTok Downloader</h2>
        <div class="input-group">
            <input type="text" id="tiktokUrl" class="url-input" placeholder="Tempel link TikTok...">
            <button class="btn btn-secondary">Download Video</button>
        </div>
    </div>
</div>

<script>
    
    const SUPABASE_URL = 'https://rhvatyydmkveoymcchhu.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_yD81l2Fmp0mIQQ3CCgyVdQ_UtOsFSUw'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    
    document.getElementById('formLaporan').addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const btn = event.target.querySelector('button');
        btn.disabled = true;
        btn.innerText = 'Mengirim...';

        const nama = document.getElementById('nama').value;
        const masalah = document.getElementById('masalah').value;
        const lokasi = document.getElementById('lokasi').value;

        const { data, error } = await _supabase
            .from('laporan')
            .insert([{ nama, masalah, lokasi, status: 'Pending' }]);

        if (error) {
            alert('Gagal: ' + error.message);
        } else {
            alert('Laporan berhasil dikirim!');
            document.getElementById('formLaporan').reset();
        }
        
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim Laporan';
    });
</script>

</body>
</html>
